<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>New Tab</title>
<style>
  /* The pitch. A quiet, warm field for the overlay to live on — the same
     engine mounts here as on any page, but this one is *yours*, so the daily
     review meets you at the moment you were context-switching anyway. */
  html, body { height:100%; margin:0; }
  body {
    overflow:hidden;
    background:
      radial-gradient(120% 90% at 50% 8%, #fbfaf6 0%, #f2efe6 52%, #e7e3d4 100%);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  /* Wordmark — present, not loud. */
  #kc-mark {
    position:fixed; left:50%; top:34px; transform:translateX(-50%);
    color:#7b7466; font-weight:650; font-size:13px; letter-spacing:0.34em;
    text-transform:uppercase; user-select:none;
  }
  /* One line of instruction, because a blank pitch shouldn't be a riddle. */
  #kc-hint {
    position:fixed; left:50%; bottom:30px; transform:translateX(-50%);
    color:#9a917f; font-weight:500; font-size:12.5px; letter-spacing:0.04em;
    user-select:none; white-space:nowrap;
  }
  #kc-hint kbd {
    font:600 11px system-ui, sans-serif; color:#6d6557;
    background:rgba(255,255,255,0.75); border:1px solid rgba(120,110,92,0.25);
    border-bottom-width:2px; border-radius:5px; padding:2px 6px;
  }
</style>
</head>
<body>
  <div id="kc-mark">Kickoff</div>
  <div id="kc-hint"><kbd>Ctrl</kbd> <kbd>Shift</kbd> <kbd>K</kbd> — offload a thought, or type <kbd>kick …</kbd> in the address bar</div>
  <!-- The same bundle the content script ships; on an extension page it loads
       directly, since content scripts don't run on chrome-extension:// URLs. -->
  <script src="content.js"></script>
</body>
</html>
