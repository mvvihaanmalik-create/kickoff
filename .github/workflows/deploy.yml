name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you re-deploy by hand from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let a newer push cancel a queued one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      # The extension bundle is gitignored, so it must be built here — demo.html
      # loads it, and without this step the demo page would 404 on its script.
      - run: npm run build:ext
      - run: npm run build
        env:
          # Pages serves from /<repo>/, so assets need that prefix or they 404.
          KICKOFF_BASE: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
